apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-portfolio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mickey/devsecops-portfolio.git' # Replace with actual repo URL
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: portfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
